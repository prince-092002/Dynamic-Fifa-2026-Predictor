name: Validate

# Offline validation only: runs against committed artifacts, never calls live
# provider APIs, and requires no secrets.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Compile all sources
        run: python -m compileall src main.py scripts dashboard

      - name: Broader data validation
        run: python main.py validate

      - name: Feature and leakage validation
        run: python main.py validate-features

      - name: Simulation validation
        run: python main.py validate-simulation

      - name: Bracket validation
        run: python main.py validate-bracket

      - name: Live forecast validation
        run: python main.py validate-live-forecast

      - name: Public export validation
        run: python main.py validate-public-exports

      - name: Dashboard validation
        run: python main.py validate-dashboard

      - name: Commit-safety and publication tests
        run: python -m pytest tests -q

  website:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Lint website
        working-directory: website
        run: npm run lint

      - name: Build website
        working-directory: website
        run: npm run build
